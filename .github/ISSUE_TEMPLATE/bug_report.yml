name: Bug Report
description: Report a bug or unexpected behavior in Kunai
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ### Let Kunai fill this in for you

        Run **`/report-issue`** inside the Kunai shell. It exports a redacted
        diagnostics bundle, then opens this form with the version, OS, terminal,
        install method, and recent events already filled in — you only add what
        happened and the steps.

        Prefer to do it by hand? Run `/export-diagnostics` and paste the result
        into the diagnostics field below. Either way, the diagnostics are the
        single most useful thing you can include.

        Diagnostics are redacted before they leave your machine: no file paths,
        hostnames, query strings, or tokens.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected to happen instead.
      placeholder: "When I do X, Y happens. I expected Z."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps to reproduce the issue.
      placeholder: |
        1. Run `kunai -S "Show Name"`
        2. Select result
        3. ...
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics output
      description: |
        Prefilled by `/report-issue`. Otherwise run `/export-diagnostics` and paste the output here.
        If the shell won't start, include the terminal output and any `logs.txt` content instead.
      render: text
    validations:
      required: false

  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      description: How did you install Kunai? (Shown by `kunai --version` once you reinstall via the installer.)
      options:
        - Binary (install.sh / install.ps1)
        - npm global (npm i -g)
        - bun global (bun i -g)
        - Source checkout (bun run link:global)
        - Not sure
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system & architecture
      placeholder: "e.g. Arch Linux x64, macOS 14 arm64, Windows 11 x64"
    validations:
      required: true

  - type: input
    id: terminal
    attributes:
      label: Terminal emulator
      placeholder: "e.g. Kitty 0.35, Ghostty 1.0, Alacritty, WezTerm, iTerm2"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Kunai version
      description: Output of `kunai --version` (or git SHA for source installs).
      placeholder: "e.g. 0.3.1"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might be relevant — screenshots, `--debug` output, related issues.
    validations:
      required: false
