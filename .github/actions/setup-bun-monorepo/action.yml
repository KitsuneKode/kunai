name: Setup Bun monorepo
description: Bun, dependency caches, and install for Kunai workspace jobs.

# Checkout is deliberately NOT part of this action. A *local* composite action
# (`uses: ./.github/actions/...`) can only be resolved once the repository is
# already on disk, so a job whose first step is this action fails before the
# checkout inside it can ever run. Every caller must run actions/checkout first.

inputs:
  turbo-cache-prefix:
    description: Prefix for the per-job .turbo GitHub Actions cache key
    required: true
  skip-turbo-cache:
    description: Skip restoring and saving the local .turbo cache
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version-file: package.json

    - name: Cache Bun install store
      uses: actions/cache@v5
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-store-${{ hashFiles('bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-store-

    - name: Cache Turbo local
      if: inputs.skip-turbo-cache != 'true'
      uses: actions/cache@v5
      with:
        path: .turbo
        key: ${{ runner.os }}-turbo-${{ inputs.turbo-cache-prefix }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-turbo-${{ inputs.turbo-cache-prefix }}-

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
