name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.TURBO_TOKEN || '' }}

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run ci

      - name: Build
        run: bun run build

      - name: Build docs
        run: bun run build:docs

      - name: Package check
        run: bun run pkg:check

      - name: Lint installer scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck install.sh uninstall.sh

      - name: Lint PowerShell installer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          $issues = Invoke-ScriptAnalyzer -Path install.ps1 -Severity Error
          if ($issues) { $issues | Format-Table; exit 1 }

      - name: Build binaries (linux smoke)
        run: |
          bun run --cwd apps/cli build:binaries --only linux-x64
          ./apps/cli/dist/bin/kunai-linux-x64 --version
