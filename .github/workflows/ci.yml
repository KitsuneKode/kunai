name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_SCM_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}

jobs:
  # Decide which expensive release-artifact jobs are worth running for this diff.
  changes:
    name: Path filters
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      cli: ${{ steps.filter.outputs.cli }}
      docs: ${{ steps.filter.outputs.docs }}
      installer: ${{ steps.filter.outputs.installer }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cli:
              - 'apps/cli/**'
              - 'packages/**'
              - 'turbo.json'
              - 'package.json'
              - 'bun.lock'
            docs:
              - 'apps/docs/**'
              - 'docs/**'
              - 'apps/cli/src/container.ts'
              - 'apps/cli/src/domain/session/command-registry.ts'
              - 'apps/cli/src/cli-args.ts'
              - 'packages/providers/**/manifest.ts'
              - 'packages/design/**'
              - 'turbo.json'
              - 'package.json'
              - 'bun.lock'
            installer:
              - 'apps/cli/scripts/build*.ts'
              - 'apps/cli/src/services/update/**'
              - 'apps/cli/test/docker/**'
              - 'apps/cli/test/integration/compiled-binary-smoke.test.ts'
              - 'apps/cli/test/integration/install-scripts-pwsh.test.ts'
              - 'apps/cli/test/integration/native-installer-docker.test.ts'
              - 'install.sh'
              - 'install.ps1'
              - 'packages/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/release.yml'

  fmt:
    name: Format check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          filter: blob:none
      - uses: ./.github/actions/setup-bun-monorepo
        with:
          turbo-cache-prefix: fmt

      - name: Format check (affected on PR)
        if: github.event_name == 'pull_request'
        run: bunx turbo run fmt:check --affected --summarize

      - name: Format check (full on main)
        if: github.event_name == 'push'
        run: bunx turbo run fmt:check --summarize

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          filter: blob:none
      - uses: ./.github/actions/setup-bun-monorepo
        with:
          turbo-cache-prefix: lint

      - name: Lint (affected on PR)
        if: github.event_name == 'pull_request'
        run: bunx turbo run lint --affected --summarize

      - name: Lint (full on main)
        if: github.event_name == 'push'
        run: bunx turbo run lint --summarize

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          filter: blob:none
      - uses: ./.github/actions/setup-bun-monorepo
        with:
          turbo-cache-prefix: typecheck

      - name: Typecheck (affected on PR)
        if: github.event_name == 'pull_request'
        run: bunx turbo run typecheck --affected --summarize

      - name: Typecheck (full on main)
        if: github.event_name == 'push'
        run: bunx turbo run typecheck --summarize

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          filter: blob:none
      - uses: ./.github/actions/setup-bun-monorepo
        with:
          turbo-cache-prefix: test

      - name: Test (affected on PR)
        if: github.event_name == 'pull_request'
        run: bunx turbo run test --affected --summarize

      - name: Test (full on main)
        if: github.event_name == 'push'
        run: bunx turbo run test --summarize

  windows-cli:
    name: Windows CLI parity (non-blocking)
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.cli == 'true'
    runs-on: windows-latest
    continue-on-error: true
    timeout-minutes: 25

    # Promote this job to blocking only after the native mpv named-pipe smoke
    # exists and the Windows parity backlog in repo-infrastructure.md is empty.
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          filter: blob:none
      - uses: ./.github/actions/setup-bun-monorepo
        with:
          turbo-cache-prefix: windows-cli

      - name: Typecheck workspaces
        run: bun run typecheck

      - name: Test CLI
        run: bun run --cwd apps/cli test

  installer-lint:
    name: Installer script lint
    needs: changes
    if: needs.changes.outputs.installer == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Lint installer scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt
          shellcheck install.sh
          shfmt -d install.sh

      - name: Lint PowerShell installer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          $issues = Invoke-ScriptAnalyzer -Path install.ps1 -Severity Error
          if ($issues) { $issues | Format-Table; exit 1 }

  build-cli:
    name: Build CLI + npm pack guard
    needs: [changes, typecheck]
    if: github.event_name == 'push' || needs.changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          filter: blob:none
      - uses: ./.github/actions/setup-bun-monorepo
        with:
          turbo-cache-prefix: build

      - name: Build npm bundle and host binary
        run: bun run build

      - name: Package check (no dist/bin bloat)
        run: bun run pkg:check

  checks-docs:
    name: Docs build
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          filter: blob:none
      - uses: ./.github/actions/setup-bun-monorepo
        with:
          turbo-cache-prefix: docs

      - name: Verify docs gate
        run: |
          bun run --cwd apps/docs generate
          bun run --cwd apps/docs scripts/check-codegen-freshness.ts
          bun run --cwd apps/docs typecheck:app
          bun run --cwd apps/docs lint
          bun run --cwd apps/docs test
          bun run --cwd apps/docs build:app

  build-binaries:
    name: Build linux binaries
    needs: [changes, typecheck]
    if: needs.changes.outputs.cli == 'true' || needs.changes.outputs.installer == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          filter: blob:none
      - uses: ./.github/actions/setup-bun-monorepo
        with:
          turbo-cache-prefix: binaries

      - name: Build linux binaries (glibc + musl)
        run: >-
          bunx turbo run build:binaries --filter=@kitsunekode/kunai --
          --only linux-x64 --only linux-x64-musl --jobs 2

      - name: Smoke test compiled binaries
        run: bash apps/cli/scripts/verify-release-binaries.sh --partial

      - name: Assert kunai version (not Bun runtime)
        run: |
          ./apps/cli/dist/bin/kunai-linux-x64 --version | tee /tmp/kunai-version.txt
          grep -q '^kunai ' /tmp/kunai-version.txt
          ./apps/cli/dist/bin/kunai-linux-x64 --help >/dev/null

      - name: Upload linux binaries for installer job
        if: needs.changes.outputs.installer == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kunai-linux-binaries
          retention-days: 1
          path: |
            apps/cli/dist/bin/kunai-linux-x64
            apps/cli/dist/bin/kunai-linux-x64-musl
            apps/cli/dist/bin/SHA256SUMS

  installer-docker:
    name: Native installer Docker smoke
    needs: [changes, build-binaries]
    if: needs.changes.outputs.installer == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - name: Download linux binaries
        uses: actions/download-artifact@v4
        with:
          name: kunai-linux-binaries
          path: apps/cli/dist/bin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache installer smoke images
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: installer-smoke-${{ runner.os }}-${{ hashFiles('apps/cli/test/docker/native-installer/Dockerfile') }}
          restore-keys: |
            installer-smoke-${{ runner.os }}-

      - name: Build glibc smoke image
        uses: docker/build-push-action@v6
        with:
          context: apps/cli/test/docker/native-installer
          file: apps/cli/test/docker/native-installer/Dockerfile
          target: glibc
          load: true
          tags: kunai-installer-smoke:glibc
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Build musl smoke image
        uses: docker/build-push-action@v6
        with:
          context: apps/cli/test/docker/native-installer
          file: apps/cli/test/docker/native-installer/Dockerfile
          target: musl
          load: true
          tags: kunai-installer-smoke:musl
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate Buildx cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache || true

      - name: Native installer smoke (glibc + musl)
        env:
          KUNAI_INSTALLER_DOCKER: "1"
        run: bash apps/cli/test/docker/native-installer/run-local.sh --skip-build --skip-image-build
