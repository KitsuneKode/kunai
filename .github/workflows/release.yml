name: Release

# Scoped to the published CLI and its release inputs.
# Other workspace packages (@kunai/*) are internal-only and never get published,
# so we deliberately do not run the version/publish pipeline on docs/formatting
# or internal-package-only changes.
on:
  push:
    branches: [main]
    paths:
      - "apps/cli/**"
      - ".changeset/**"
      - ".changeset/config.json"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - ".github/workflows/release.yml"
      - "scripts/release-guard.ts"
      - "scripts/sync-root-changelog.ts"
      - "CHANGELOG.md"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  release:
    name: Version PR / Publish
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run ci

      - name: Build
        run: bun run build

      - name: Package check
        run: bun run pkg:check

      - name: Release guard
        run: bun run guard

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: bun run version:packages
          publish: bun run release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
