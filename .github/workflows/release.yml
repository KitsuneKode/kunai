name: Release

# Scoped to the published CLI and its release inputs.
# Other workspace packages (@kunai/*) are internal-only and never get published,
# so we deliberately do not run the version/publish pipeline on docs/formatting
# or internal-package-only changes.
on:
  push:
    branches: [main]
    paths:
      - "apps/cli/**"
      - "install.sh"
      - "install.ps1"
      - "packages/**"
      - ".changeset/**"
      - ".changeset/config.json"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - ".github/workflows/release.yml"
      - ".release/**"
      - "scripts/release-changelog.ts"
      - "scripts/generate-release-notes.ts"
      - "scripts/release-binary-checksums.ts"
      - "scripts/release-guard.ts"
      - "scripts/sync-root-changelog.ts"
      - "CHANGELOG.md"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_SCM_BASE: ""

jobs:
  release:
    name: Version PR / Publish
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      published: ${{ steps.changesets.outputs.published }}

    steps:
      - uses: ./.github/actions/setup-bun-monorepo
        with:
          turbo-cache-prefix: release

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Update npm
        run: npm install -g npm@latest

      - name: Verify
        run: bun run ci

      - name: Build
        run: bun run build

      - name: Package check
        run: bun run pkg:check

      - name: Release guard
        run: bun run guard

      - name: Release notes guard
        run: bun run release:notes:check

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version:packages
          publish: bun run release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Cross-platform standalone binaries, built once per published version so npm
  # and the binaries always ship in lockstep (Spec A §2.3). Gated on an actual
  # publish so it never runs for the version PR.
  binaries:
    name: Build & upload release binaries
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: ./.github/actions/setup-bun-monorepo
        with:
          turbo-cache-prefix: release-binaries

      - name: Build binaries
        run: bunx turbo run build:binaries --filter=@kitsunekode/kunai -- --jobs 2

      - name: Verify release binaries
        run: bash apps/cli/scripts/verify-release-binaries.sh

      - name: Resolve published version
        id: ver
        run: echo "tag=v$(bun -e 'console.log(require(\"./apps/cli/package.json\").version)')" >> "$GITHUB_OUTPUT"

      - name: Release notes guard (binary upload)
        run: test -f ".release/kunai-${{ steps.ver.outputs.tag }}.md"

      # Publishes a release tagged `v<version>` and marks it latest, so the
      # download contract (`releases/latest/download/<asset>` and
      # `releases/download/v<version>/<asset>`) resolves to these binaries.
      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          make_latest: true
          body_path: .release/kunai-${{ steps.ver.outputs.tag }}.md
          files: |
            apps/cli/dist/bin/kunai-linux-x64
            apps/cli/dist/bin/kunai-linux-arm64
            apps/cli/dist/bin/kunai-linux-x64-musl
            apps/cli/dist/bin/kunai-linux-arm64-musl
            apps/cli/dist/bin/kunai-darwin-x64
            apps/cli/dist/bin/kunai-darwin-arm64
            apps/cli/dist/bin/kunai-windows-x64.exe
            apps/cli/dist/bin/kunai-windows-arm64.exe
            apps/cli/dist/bin/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
